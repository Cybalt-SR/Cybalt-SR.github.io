<!DOCTYPE html>
<html>

<head>
    <title>GCF Sta. Rosa | Contact</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="SiteIcon.jpg">
    <link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="custom.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="w3-white">
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v14.0"
        nonce="6ofsQoWZ"></script>

    <div id="nav"></div>

    <!-- Page Content -->
    <div class="" id="main">

        <!-- Header/Home -->
        <header class="w3-container w3-padding-32 w3-center w3-black halfheader" id="home"
            style="background-image: url('Home/homebannerimage.jpg');">
            <span>
                <h1 class="dynamicvisibility simplefade"><strong> Contact Us </strong></h1>
            </span>
        </header>

        <!-- Summary Section -->
        <div class="w3-content w3-justify w3-padding-large">
            <h2 class="dynamicvisibility simplefade"><strong>We're here for you!</strong></h2>
            Feel free to call or message us. We would love to connect with you.
        </div>
        <hr style="width:40%;">
        <div class="w3-content w3-justify w3-padding-large">
            <h3 class="dynamicvisibility simplefade"><strong>GCF Santa Rosa</strong></h3>
            <div id="address"></div>

            <div class="w3-row">
                <div class="w3-half" id="phonenumbers">
                    <strong>Phone Numbers:</strong>

                </div>
                <div class="w3-half" id="emails">
                    <strong>Emails:</strong>

                </div>
            </div>
        </div>
        <hr style="width:40%;">

        <!-- Footer -->
        <div id="footer"></div>

        <!-- END PAGE CONTENT -->
    </div>
</body>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
<script src="frontend.js"></script>

<object data="footer.html" onload="LoadFooter(this);this.remove();"></object>
<object data="nav.html" onload="LoadNav(this);this.remove();"></object>

<object data="Contact/address.txt" onload="LoadAddress(this);this.remove();"></object>
<object data="Contact/phonenumbers.txt" onload="LoadPhonenumbers(this);this.remove();"></object>
<object data="Contact/emails.txt" onload="LoadEmails(this);this.remove();"></object>
<script>
    function LoadAddress(data) {
        data = prepContent(data);
        var paragraph = "";

        var datas = data.split(/\r?\n/);
        for (let i = 0; i < datas.length; i++) {
            paragraph += '<p>';
            paragraph += datas[i];
            paragraph += '</p>';
        }

        document.getElementById("address").innerHTML = paragraph;
    }

    function LoadList(data, id) {
        data = prepContent(data);

        var addition = '';
        var hasSplit = false;

        var datas = data.split(/\r?\n/);
        for (let i = 0; i < datas.length; i++) {
            if (i % 2 == 0) {
                addition += '<p>';
                addition += datas[i];
                addition += '<br><strong class="w3-small">';
            }
            else {
                addition += datas[i];
                addition += '</strong></p>';
            }
        }

        document.getElementById(id).innerHTML += addition + "";
    }

    function LoadPhonenumbers(data) {
        LoadList(data, "phonenumbers");
    }
    function LoadEmails(data) {
        LoadList(data, "emails");
    }
</script>

</html>
