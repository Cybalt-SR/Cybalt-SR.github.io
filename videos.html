<!DOCTYPE html>
<html>

<head>
    <title>GCF Sta. Rosa | Videos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="SiteIcon.jpg">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="w3-white">
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v14.0"
        nonce="6ofsQoWZ"></script>

    <div id="nav"></div>

    <!-- Page Content -->
    <div class="" id="main">

        <!-- Header/Home -->
        <header class="w3-container w3-padding-32 w3-center w3-black halfheader" id="home"
            style="background-image: url('Home/homebannerimage.jpg');">
            <span>
                <h1 class="dynamicvisibility simplefade"><strong> Videos </strong></h1>
            </span>
        </header>

        <!-- Summary Section -->
        <div class="w3-content w3-justify w3-padding-large">
            <iframe class="latestVideoEmbed" vnum='0' width="100%" height="100%" frameborder="0" allowfullscreen
                id="maindisplay"></iframe>
            <hr style="width:90%;">
            <h3 class="dynamicvisibility simplefade">More Videos</h3>
            <div class="w3-row">
                <div class="w3-third absolute">
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='1' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='4' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='7' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                </div>
                <div class="w3-third absolute">
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='2' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='5' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='8' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                </div>
                <div class="w3-third absolute">
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='3' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='6' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                    <div class="w3-padding-grid">
                        <div class="latestVideoThumbnail" vnum='9' width="100%" frameborder="0" allowfullscreen
                            onclick="ReplaceVideo(this)">
                            <div class="w3-small"><span></span></div>
                        </div>
                    </div>
                </div>
            </div>
            <hr style="width:90%;">
            <button class="hollow dynamicvisibility simplefade" style="min-width: 100%;">Youtube</button>
            <p></p>
            <button class="hollow dynamicvisibility simplefade" style="min-width: 100%;">Facebook</button>
        </div>

        <!-- Footer -->
        <div id="footer"></div>

        <!-- END PAGE CONTENT -->
    </div>
</body>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
<script src="frontend.js"></script>

<object data="footer.html" onload="LoadFooter(this);this.remove();"></object>
<object data="nav.html" onload="LoadNav(this);this.remove();"></object>

<script>
    function ReplaceVideo(triggerer) {
        var vnum = triggerer.getAttribute('vnum');

        var maindisplay = document.getElementById('maindisplay')
        maindisplay.setAttribute("vnum", vnum);
        loadVideo(maindisplay);
    }
</script>

</html>
